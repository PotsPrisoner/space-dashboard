name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar"
          ls -la gradle/wrapper/
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioSpaceMonitor-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: BioSpace Monitor - Latest Build
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## BioSpace Monitor v10
            Download app-debug.apk and install on Android.
            Enable "Install from unknown sources" in Settings first.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
